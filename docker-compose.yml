# ──────────────────────────────────────────────────────────────────────────────
# Network Segmentation — cada capa solo alcanza los servicios que necesita.
#   frontend-net:  frontend ↔ gateway
#   backend-net:   gateway ↔ servicios lógicos
#   data-net:      servicios lógicos ↔ datastores (postgres, redis, elasticsearch)
#   broker-net:    servicios lógicos ↔ RabbitMQ
# ──────────────────────────────────────────────────────────────────────────────
networks:
  frontend-net:
    driver: bridge
  backend-net:
    driver: bridge
  data-net:
    driver: bridge
  broker-net:
    driver: bridge

volumes:
  postgres-data:
  rabbitmq-data:
  redis-data:
  elasticsearch-data:
  postgres-notifications-data:

services:

  # ──────────────────────────────────────────────────────────────────────────
  # INFRAESTRUCTURA — datastores y broker
  # ──────────────────────────────────────────────────────────────────────────

  # ---- Base de datos relacional (pets-service) ----
  postgres:
    container_name: Adopti_pets-db
    image: postgres:15
    environment:
      POSTGRES_DB: petsdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    volumes:
      - postgres-data:/var/lib/postgresql/data
    expose:
      - "5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres -d petsdb" ]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    networks:
      - data-net

  # ---- Base de datos relacional (notification-service) ----
  postgres-notifications:
    container_name: Adopti_notifications-db
    image: postgres:15
    environment:
      POSTGRES_DB: notificationsdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    volumes:
      - postgres-notifications-data:/var/lib/postgresql/data
    expose:
      - "5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres -d notificationsdb" ]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    networks:
      - data-net

  # ---- Message Broker (RabbitMQ) ----
  rabbitmq:
    container_name: Adopti_broker
    image: rabbitmq:3.13-management
    environment:
      RABBITMQ_DEFAULT_USER: adopti
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-rabbitmq_secret}
    expose:
      - "5672"
      - "15672"
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    healthcheck:
      test: [ "CMD", "rabbitmq-diagnostics", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    networks:
      - broker-net

  # ---- Cache + Async Queue (Redis) ----
  redis:
    container_name: Adopti_cache-queue
    image: redis:7-alpine
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data
    expose:
      - "6379"
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - data-net

  # ---- Search Engine (Elasticsearch) ----
  elasticsearch:
    container_name: Adopti_search
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.4
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms256m -Xmx512m
    volumes:
      - elasticsearch-data:/usr/share/elasticsearch/data
    expose:
      - "9200"
    healthcheck:
      test: [ "CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1" ]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s
    restart: unless-stopped
    networks:
      - data-net

  # ──────────────────────────────────────────────────────────────────────────
  # SERVICIOS LÓGICOS
  # ──────────────────────────────────────────────────────────────────────────

  # ---- Pets Service (FastAPI / Python) ----
  pets-service:
    container_name: Adopti_pets
    build: ../pets-service/pets-service
    env_file:
      - ../pets-service/pets-service/.env
    volumes:
      - ../pets-service/firebase-config:/firebase-config
    expose:
      - "8000"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "python", "-c", "import urllib.request,sys; sys.exit(0) if urllib.request.urlopen('http://localhost:8000/health', timeout=2).status == 200 else sys.exit(1)" ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    restart: unless-stopped
    networks:
      - backend-net
      - data-net
      - broker-net

  # ---- Chat Service (Spring Boot / Java) ----
  chat-service:
    container_name: Adopti_chat
    build: ../chat-service
    env_file:
      - ../chat-service/.env
    volumes:
      - ../chat-service/src/main/resources/adoptiswarch-dc4da-firebase-adminsdk-fbsvc-21e2ea6cae.json:/app/firebase-credentials.json:ro
    expose:
      - "8081"
    depends_on:
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: [ "CMD-SHELL", "wget -q -O - --header='Content-Type: application/json' --post-data='{\"query\":\"{__typename}\"}' http://localhost:8081/graphql | grep -q __typename" ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 40s
    restart: unless-stopped
    networks:
      - backend-net
      - broker-net

  # ---- Notification Service (Go) ----
  notification-service:
    container_name: Adopti_notifications
    build: ../notification-service
    env_file:
      - ../notification-service/.env
    volumes:
      - ../notification-service/firebase-credentials.json:/app/firebase-credentials.json:ro
    expose:
      - "8082"
    depends_on:
      postgres-notifications:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "wget", "--spider", "-q", "http://127.0.0.1:8082/health" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped
    networks:
      - backend-net
      - data-net
      - broker-net

  # ---- Matching Service (Kotlin / Spring Boot) ----
  matching-service:
    container_name: Adopti_matching
    build: ../matching-service
    env_file:
      - ../matching-service/.env
    expose:
      - "8083"
    depends_on:
      elasticsearch:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: [ "CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:8083/health || exit 1" ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 60s
    restart: unless-stopped
    networks:
      - backend-net
      - data-net
      - broker-net

  # ---- Media Service (Node.js / TypeScript) ----
  media-service:
    container_name: Adopti_media
    build: ../media-service
    env_file:
      - ../media-service/.env
    volumes:
      - ../media-service/firebase-credentials.json:/app/firebase-credentials.json:ro
    expose:
      - "8084"
    depends_on:
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:8084/api/media/health" ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped
    networks:
      - backend-net
      - data-net
      - broker-net

  # ──────────────────────────────────────────────────────────────────────────
  # PRESENTACION Y GATEWAY
  # ──────────────────────────────────────────────────────────────────────────

  # ---- API Gateway (Nginx) ----
  gateway:
    container_name: Adopti_gateway
    image: nginx:1.27-alpine
    volumes:
      - ../gateway/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ../gateway/certs:/etc/nginx/certs:ro
    ports:
      - "80:80"
    depends_on:
      pets-service:
        condition: service_healthy
      chat-service:
        condition: service_healthy
      matching-service:
        condition: service_healthy
      notification-service:
        condition: service_healthy
      media-service:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "curl", "-f", "-k", "https://127.0.0.1:80/health" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    restart: unless-stopped
    networks:
      - frontend-net
      - backend-net

  # ---- Frontend (Next.js 16 SSR) ----
  frontend:
    container_name: Adopti_frontend
    build: ../frontend-ssr
    env_file:
      - ../frontend-ssr/.env
    expose:
      - "3000"
    depends_on:
      gateway:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "wget", "--spider", "-q", "http://127.0.0.1:3000/" ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    networks:
      - frontend-net
