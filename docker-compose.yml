networks:
  public-net:       # reverse-proxy only — host ports 80 and 443 are bound here
    driver: bridge
  presentation-net: # reverse-proxy ↔ frontend ↔ gateway; no host exposure
    driver: bridge
  backend-net:      # gateway ↔ microservices + monitoring; no host exposure
    driver: bridge
  data-net:         # microservices ↔ postgres / redis / elasticsearch; fully internal
    driver: bridge
    internal: true
  broker-net:       # microservices ↔ rabbitmq; fully internal
    driver: bridge
    internal: true

volumes:
  postgres-data:
  rabbitmq-data:
  redis-data:
  elasticsearch-data:
  postgres-notifications-data:
  prometheus-data:
  grafana-data:

services:

  # ──────────────────────────────────────────────────────────────────────────
  # INFRAESTRUCTURA — datastores y broker
  # ──────────────────────────────────────────────────────────────────────────

  # ---- Base de datos relacional (pets-service) ----
  postgres:
    container_name: Adopti_pets-db
    image: postgres:15
    environment:
      POSTGRES_DB: ${POSTGRES_PETS_DB:-petsdb}
      POSTGRES_USER: ${POSTGRES_PETS_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PETS_PASSWORD:?POSTGRES_PETS_PASSWORD is required}
    entrypoint: ["/postgres-entrypoint.sh"]
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ../security/postgres/pets-server.crt:/var/lib/postgresql/server.crt:ro
      - ../security/postgres/pets-server.key:/var/lib/postgresql/server.key:ro
      - ../security/postgres/ca.crt:/var/lib/postgresql/ca.crt:ro
      - ./postgres-entrypoint.sh:/postgres-entrypoint.sh:ro
      - ./postgres-init-ssl.sh:/docker-entrypoint-initdb.d/01-ssl.sh:ro
    expose:
      - "5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres -d petsdb" ]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    networks:
      - data-net

  # ---- Base de datos relacional (notification-service) ----
  postgres-notifications:
    container_name: Adopti_notifications-db
    image: postgres:15
    environment:
      POSTGRES_DB: ${POSTGRES_NOTIF_DB:-notificationsdb}
      POSTGRES_USER: ${POSTGRES_NOTIF_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_NOTIF_PASSWORD:?POSTGRES_NOTIF_PASSWORD is required}
    entrypoint: ["/postgres-entrypoint.sh"]
    volumes:
      - postgres-notifications-data:/var/lib/postgresql/data
      - ../security/postgres-notifications/notif-server.crt:/var/lib/postgresql/server.crt:ro
      - ../security/postgres-notifications/notif-server.key:/var/lib/postgresql/server.key:ro
      - ../security/postgres-notifications/ca.crt:/var/lib/postgresql/ca.crt:ro
      - ./postgres-entrypoint.sh:/postgres-entrypoint.sh:ro
      - ./postgres-init-ssl.sh:/docker-entrypoint-initdb.d/01-ssl.sh:ro
    expose:
      - "5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres -d notificationsdb" ]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    networks:
      - data-net

  # ---- Message Broker (RabbitMQ) ----
  rabbitmq:
    container_name: Adopti_broker
    image: rabbitmq:3.13-management
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-adopti}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:?RABBITMQ_PASSWORD is required}
    expose:
      - "5671"
      - "15671"
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
      - ../security/rabbitmq/:/etc/rabbitmq/certs:ro
      - ./rabbitmq/rabbitmq.conf:/etc/rabbitmq/rabbitmq.conf:ro
    healthcheck:
      test: [ "CMD", "rabbitmq-diagnostics", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    networks:
      - broker-net

  # ---- Cache + Async Queue (Redis) ----
  redis:
    container_name: Adopti_cache-queue
    image: redis:7-alpine
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data
    expose:
      - "6379"
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - data-net

  # ---- Search Engine (Elasticsearch) ----
  elasticsearch:
    container_name: Adopti_search
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.4
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=true
      - xpack.security.transport.ssl.enabled=true
      - xpack.security.transport.ssl.verification_mode=certificate
      - xpack.security.transport.ssl.certificate=/usr/share/elasticsearch/config/certs/es.crt
      - xpack.security.transport.ssl.key=/usr/share/elasticsearch/config/certs/es.key
      - xpack.security.transport.ssl.certificate_authorities=/usr/share/elasticsearch/config/certs/ca.crt
      - xpack.security.http.ssl.enabled=true
      - xpack.security.http.ssl.certificate=/usr/share/elasticsearch/config/certs/es.crt
      - xpack.security.http.ssl.key=/usr/share/elasticsearch/config/certs/es.key
      - xpack.security.http.ssl.certificate_authorities=/usr/share/elasticsearch/config/certs/ca.crt
      - ELASTIC_PASSWORD=${ELASTIC_PASSWORD:?ELASTIC_PASSWORD is required}
      - ES_JAVA_OPTS=-Xms256m -Xmx512m
    volumes:
      - elasticsearch-data:/usr/share/elasticsearch/data
      - ../security/elasticsearch/:/usr/share/elasticsearch/config/certs:ro
      - ./elasticsearch-healthcheck.sh:/usr/local/bin/elasticsearch-healthcheck.sh:ro
    expose:
      - "9200"
    healthcheck:
      test: ["CMD-SHELL", "/usr/local/bin/elasticsearch-healthcheck.sh"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s
    restart: unless-stopped
    networks:
      - data-net

  # ──────────────────────────────────────────────────────────────────────────
  # SERVICIOS LÓGICOS
  # ──────────────────────────────────────────────────────────────────────────

  # ---- Pets Service (FastAPI / Python) ----
  # Toda la configuración vive en ../pets-service/pets-service/.env
  # (env_file). El bloque `environment:` se eliminó para que el .env sea
  # la única fuente de verdad: editar el .env y `docker compose up` ya
  # refleja el cambio.
  pets-service:
    container_name: Adopti_pets
    build: ../pets-service/pets-service
    env_file:
      - ../pets-service/pets-service/.env
    environment:
      TLS_CERT_PATH: /app/certs/server.crt
      TLS_KEY_PATH: /app/certs/server.key
      TLS_CA_PATH: /app/certs/ca.crt
    volumes:
      - ../pets-service/firebase-config:/firebase-config
      - ../security/pets-service/pets-service.crt:/app/certs/server.crt:ro
      - ../security/pets-service/pets-service.key:/app/certs/server.key:ro
      - ../security/ca/ca.crt:/app/certs/ca.crt:ro
      - ../security/ca/healthcheck-client.crt:/app/certs/healthcheck-client.crt:ro
      - ../security/ca/healthcheck-client.key:/app/certs/healthcheck-client.key:ro
    expose:
      - "8443"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: [ "CMD-SHELL", "curl -fk --cert /app/certs/healthcheck-client.crt --key /app/certs/healthcheck-client.key https://localhost:8443/health || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    restart: unless-stopped
    networks:
      - backend-net
      - data-net
      - broker-net

  # ---- Chat Service (Spring Boot / Java) ----
  # Configuración consolidada en ../chat-service/.env.
  chat-service:
    container_name: Adopti_chat
    build: ../chat-service
    env_file:
      - ../chat-service/.env
    environment:
      SSL_KEYSTORE_PASSWORD: ${SSL_KEYSTORE_PASSWORD:?SSL_KEYSTORE_PASSWORD is required}
      SSL_TRUSTSTORE_PASSWORD: ${SSL_TRUSTSTORE_PASSWORD:?SSL_TRUSTSTORE_PASSWORD is required}
    volumes:
      - ../chat-service/src/main/resources/adoptiswarch-dc4da-firebase-adminsdk-fbsvc-21e2ea6cae.json:/app/firebase-credentials.json:ro
      - ../security/chat-service/keystore.p12:/app/certs/keystore.p12:ro
      - ../security/chat-service/chat-service.crt:/app/certs/chat-service.crt:ro
      - ../security/chat-service/chat-service.key:/app/certs/chat-service.key:ro
      - ../security/ca/ca.crt:/app/certs/ca.crt:ro
      - ../security/ca/truststore.jks:/app/certs/truststore.jks:ro
      - ../security/ca/healthcheck-client.crt:/app/certs/healthcheck-client.crt:ro
      - ../security/ca/healthcheck-client.key:/app/certs/healthcheck-client.key:ro
    expose:
      - "8443"
    depends_on:
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: [ "CMD-SHELL", "curl -fk --cert /app/certs/healthcheck-client.crt --key /app/certs/healthcheck-client.key -H 'Content-Type: application/json' -d '{\"query\":\"{__typename}\"}' https://localhost:8443/graphql | grep -q __typename || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 40s
    restart: unless-stopped
    networks:
      - backend-net
      - broker-net

  # ---- Notification Service (Go) ----
  # Configuración consolidada en ../notification-service/.env.
  notification-service:
    container_name: Adopti_notifications
    build: ../notification-service
    env_file:
      - ../notification-service/.env
    environment:
      TLS_CERT_PATH: /app/certs/server.crt
      TLS_KEY_PATH: /app/certs/server.key
      TLS_CA_PATH: /app/certs/ca.crt
    volumes:
      - ../notification-service/firebase-credentials.json:/app/firebase-credentials.json:ro
      - ../security/notification-service/notification-service.crt:/app/certs/server.crt:ro
      - ../security/notification-service/notification-service.key:/app/certs/server.key:ro
      - ../security/ca/ca.crt:/app/certs/ca.crt:ro
      - ../security/ca/healthcheck-client.crt:/app/certs/healthcheck-client.crt:ro
      - ../security/ca/healthcheck-client.key:/app/certs/healthcheck-client.key:ro
    expose:
      - "8443"
    depends_on:
      postgres-notifications:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: [ "CMD-SHELL", "curl -fk --cert /app/certs/healthcheck-client.crt --key /app/certs/healthcheck-client.key https://127.0.0.1:8443/health || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped
    networks:
      - backend-net
      - data-net
      - broker-net

  # ---- Matching Service (Kotlin / Spring Boot) ----
  # Configuración consolidada en ../matching-service/.env.
  matching-service:
    container_name: Adopti_matching
    build: ../matching-service
    env_file:
      - ../matching-service/.env
    environment:
      SSL_KEYSTORE_PASSWORD: ${SSL_KEYSTORE_PASSWORD:?SSL_KEYSTORE_PASSWORD is required}
      SSL_TRUSTSTORE_PASSWORD: ${SSL_TRUSTSTORE_PASSWORD:?SSL_TRUSTSTORE_PASSWORD is required}
    volumes:
      - ../security/matching-service/keystore.p12:/app/certs/keystore.p12:ro
      - ../security/matching-service/matching-service.crt:/app/certs/matching-service.crt:ro
      - ../security/matching-service/matching-service.key:/app/certs/matching-service.key:ro
      - ../security/ca/ca.crt:/app/certs/ca.crt:ro
      - ../security/ca/truststore.jks:/app/certs/truststore.jks:ro
      - ../security/ca/healthcheck-client.crt:/app/certs/healthcheck-client.crt:ro
      - ../security/ca/healthcheck-client.key:/app/certs/healthcheck-client.key:ro
    expose:
      - "8443"
    depends_on:
      elasticsearch:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: [ "CMD-SHELL", "curl -fk --cert /app/certs/healthcheck-client.crt --key /app/certs/healthcheck-client.key https://localhost:8443/health || exit 1" ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 60s
    restart: unless-stopped
    networks:
      - backend-net
      - data-net
      - broker-net

  # ---- Media Service (Node.js / TypeScript) ----
  # Configuración consolidada en ../media-service/.env.
  media-service:
    container_name: Adopti_media
    build: ../media-service
    env_file:
      - ../media-service/.env
    environment:
      TLS_CERT_PATH: /app/certs/server.crt
      TLS_KEY_PATH: /app/certs/server.key
      TLS_CA_PATH: /app/certs/ca.crt
    volumes:
      - ../media-service/firebase-credentials.json:/app/firebase-credentials.json:ro
      - ../security/media-service/media-service.crt:/app/certs/server.crt:ro
      - ../security/media-service/media-service.key:/app/certs/server.key:ro
      - ../security/ca/ca.crt:/app/certs/ca.crt:ro
      - ../security/ca/healthcheck-client.crt:/app/certs/healthcheck-client.crt:ro
      - ../security/ca/healthcheck-client.key:/app/certs/healthcheck-client.key:ro
    expose:
      - "8443"
    depends_on:
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      # 127.0.0.1 explícito: en alpine, `localhost` resuelve a IPv6 (::1)
      # primero y Fastify escucha solo en IPv4.
      test: [ "CMD-SHELL", "curl -fk --cert /app/certs/healthcheck-client.crt --key /app/certs/healthcheck-client.key https://127.0.0.1:8443/api/media/health || exit 1" ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped
    networks:
      - backend-net
      - data-net
      - broker-net

  # ──────────────────────────────────────────────────────────────────────────
  # PRESENTACIÓN Y GATEWAY
  # ──────────────────────────────────────────────────────────────────────────

  # ---- API Gateway (Nginx) ----
  gateway:
    container_name: Adopti_gateway
    image: nginx:1.27-alpine
    volumes:
      - ../gateway/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ../gateway/certs:/etc/nginx/certs:ro
      - ../gateway/htpasswd:/etc/nginx/htpasswd:ro
      - ../security/ca/healthcheck-client.crt:/etc/nginx/client-certs/client.crt:ro
      - ../security/ca/healthcheck-client.key:/etc/nginx/client-certs/client.key:ro
    expose:
      - "443"
    depends_on:
      pets-service:
        condition: service_healthy
      chat-service:
        condition: service_healthy
      matching-service:
        condition: service_healthy
      notification-service:
        condition: service_healthy
      media-service:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "curl", "-f", "-k",
              "--cert", "/etc/nginx/client-certs/client.crt",
              "--key",  "/etc/nginx/client-certs/client.key",
              "https://127.0.0.1:443/health" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    restart: unless-stopped
    networks:
      - presentation-net
      - backend-net

  # ---- Frontend (Next.js 16 SSR) ----
  # Configuración consolidada en ../frontend-ssr/.env.
  frontend:
    container_name: Adopti_frontend
    build: ../frontend-ssr
    env_file:
      - ../frontend-ssr/.env
    expose:
      - "3000"
    healthcheck:
      test: [ "CMD", "wget", "--spider", "-q", "http://127.0.0.1:3000/" ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    networks:
      - presentation-net

  # ---- Reverse Proxy (NGINX) ----
  # Public internet-facing entry point. Handles TLS termination toward browsers
  # and acts as mTLS client toward the API gateway.
  # Must start after both gateway and frontend are healthy.
  reverse-proxy:
    container_name: Adopti_reverse_proxy
    image: nginx:1.27-alpine
    volumes:
      - ../reverse-proxy/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ../reverse-proxy/certs:/etc/nginx/certs:ro
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      gateway:
        condition: service_healthy
      frontend:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "curl", "-f", "-k", "https://127.0.0.1:443/health" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    restart: unless-stopped
    networks:
      - public-net
      - presentation-net

  # ──────────────────────────────────────────────────────────────────────────
  # MONITOREO
  # ──────────────────────────────────────────────────────────────────────────

  nginx-exporter:
    container_name: Adopti_nginx_exporter
    image: nginx/nginx-prometheus-exporter:1.3
    command:
      - -nginx.scrape-uri=http://gateway/nginx_status
    expose:
      - "9113"
    depends_on:
      - gateway
    networks:
      - backend-net

  prometheus:
    container_name: Adopti_prometheus
    image: prom/prometheus:v2.54.1
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    expose:
      - "9090"
    networks:
      - backend-net

  grafana:
    container_name: Adopti_grafana
    image: grafana/grafana:11.2.0
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana.ini:/etc/grafana/grafana.ini:ro
    expose:
      - "3000"
    networks:
      - backend-net
